  <script>
    (function(){if(!window.chatbase||window.chatbase("getState")!=="initialized"){window.chatbase=(...arguments)=>{if(!window.chatbase.q){window.chatbase.q=[]}window.chatbase.q.push(arguments)};window.chatbase=new Proxy(window.chatbase,{get(target,prop){if(prop==="q"){return target.q}return(...args)=>target(prop,...args)}})}const onLoad=function(){const script=document.createElement("script");script.src="https://www.chatbase.co/embed.min.js";script.id="j9Lh2F3IAy8j9DoOjdRZx";script.domain="www.chatbase.co";document.body.appendChild(script)};if(document.readyState==="complete"){onLoad()}else{window.addEventListener("load",onLoad)}})();
  </script>
  <script>
    window.chatbase("identify", {
      user_id: "visitor",
      user_metadata: "用戶目前在：Chatbase B 頁面。頁面顯示的詩：孟浩然《春曉》- 春眠不覺曉，處處聞啼鳥。夜來風雨聲，花落知多少。"
