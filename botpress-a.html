<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Botpress A</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav>
    <a href="index.html">Home</a>
    <a href="chatbase-a.html">Chatbase A</a>
    <a href="chatbase-b.html">Chatbase B</a>
    <a href="botpress-a.html" class="active">Botpress A</a>
    <a href="botpress-b.html">Botpress B</a>
  </nav>
  <main>
    <h1>Botpress A 🤖</h1>
    <article>
      <h2>登鸛雀樓 — 王之渙</h2>
      <p>A 白日依山盡，</p>
      <p>B 黃河入海流。</p>
      <p>C 欲窮千里目，</p>
      <p>D 更上一層樓。</p>
    </article>
  </main>
  <script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
  <script src="https://files.bpcontent.cloud/2026/03/20/01/20260320014645-ZVI72BHA.js" defer></script>
  <script src="botpress.js"></script>
  <script>
    window.botpress.on('webchat:initialized', () => {
      window.botpress.updateUser({
        data: {
          poem_title: "登鸛雀樓",
          poem_author: "王之渙",
          poem_content: "A 白日依山盡，B 黃河入海流。C 欲窮千里目，D 更上一層樓。"
        }
      });
    });
  </script>
</body>
</html>
